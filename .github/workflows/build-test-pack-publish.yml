name: Build, Test, Pack, Publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history is required for `node-version check`/`diff`

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check version bump (self-check)
        if: github.event_name == 'pull_request'
        run: node dist/cli.js check --input package.json --base origin/${{ github.base_ref }}

  publish:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires npm CLI >= 11.5.1, which needs Node >= 22.14.0.
          # Node 24.x already bundles a sufficiently new npm (>= 11.16), so no self-upgrade is
          # needed here. Do NOT run `npm install -g npm@latest` — self-upgrading npm in place is
          # known to corrupt its own node_modules tree (missing optional deps like `sigstore`,
          # used for provenance), which breaks `npm publish` with MODULE_NOT_FOUND.
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify npm CLI version supports trusted publishing
        run: |
          NPM_VERSION="$(npm --version)"
          echo "npm CLI version: $NPM_VERSION"
          node -e "
            const [major, minor] = '$NPM_VERSION'.split('.').map(Number);
            if (major < 11 || (major === 11 && minor < 5)) {
              console.error('npm CLI $NPM_VERSION is too old for trusted publishing (needs >= 11.5.1)');
              process.exit(1);
            }
          "

      - name: Build
        run: npm run build

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify package metadata was read
        run: |
          if [ -z "${{ steps.pkg.outputs.version }}" ]; then
            echo "::error::Failed to read package version from package.json" >&2
            exit 1
          fi
          echo "Publishing ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}"

      - name: Tag release
        run: |
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

      - name: Publish to npm
        # No NODE_AUTH_TOKEN needed: npm CLI >= 11.5.1 automatically detects the GitHub Actions
        # OIDC environment and exchanges it for a short-lived publish token. Provenance is
        # generated automatically for trusted, public-repo, public-package publishes.
        run: npm publish --access public

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.pkg.outputs.version }}"
          generate_release_notes: true
