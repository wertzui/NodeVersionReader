name: Check version bump

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history is required for git diff

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check version bump
        run: node dist/cli.js check --input package.json --base origin/main --filter "private=^(?!true$)"
